<html>
<body style="text-align:center;font-family:Arial;">
    
<title>virtix games juego 2</title>

<h1>Juego 2 - Adivina el número</h1>

<p>Elige un número del 1 al 5</p>

<input id="numero" type="number" min="1" max="5">

<br><br>

<button onclick="adivinar()">Intentar</button>

<p id="resultado"></p>

<br>

<a href="/">
<button>Volver</button>
</a>

<script>

let numeroSecreto = Math.floor(Math.random()*5)+1

function adivinar(){

let numero = document.getElementById("numero").value

if(numero == numeroSecreto){
document.getElementById("resultado").innerText = "¡Ganaste! 🎉"
}else{
document.getElementById("resultado").innerText = "Perdiste 😢 El número era " + numeroSecreto
}

}

</script>

</body>
</html>
